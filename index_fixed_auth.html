<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Familien-Belegungsplan Ferienwohnung</title>
  <meta name="description" content="Cloud-WebApp für die Planung und Nachverfolgung der Belegung einer Ferienwohnung innerhalb der Familie." />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #e3e8f0;
      --primary: #233876;
      --primary-2: #1d4ed8;
      --danger: #b42318;
      --success: #067647;
      --warning: #b54708;
      --shadow: 0 18px 40px rgba(20, 35, 70, .10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(35, 56, 118, .16), transparent 34rem),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    a { color: inherit; }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -.03em;
      font-size: 1.08rem;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 30px rgba(29, 78, 216, .22);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 24px;
      align-items: stretch;
    }

    .card {
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(226, 232, 240, .92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .padded { padding: clamp(18px, 3vw, 30px); }

    h1, h2, h3 { margin: 0; letter-spacing: -.04em; line-height: 1.05; }
    h1 { font-size: clamp(2rem, 6vw, 4.5rem); max-width: 780px; }
    h2 { font-size: clamp(1.3rem, 3vw, 2rem); }
    h3 { font-size: 1.05rem; }

    p { color: var(--muted); line-height: 1.6; margin: 12px 0 0; }

    .lead { font-size: 1.08rem; max-width: 720px; }

    .stack { display: grid; gap: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-size: .92rem;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      min-height: 46px;
      padding: 11px 13px;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    textarea { min-height: 86px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: #93b4ff;
      box-shadow: 0 0 0 4px rgba(29, 78, 216, .12);
    }

    button {
      border: 0;
      min-height: 44px;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 28px rgba(29, 78, 216, .20);
    }

    button.secondary {
      color: var(--primary);
      background: #eef4ff;
      box-shadow: none;
    }

    button.ghost {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.danger {
      background: #fff1f0;
      color: var(--danger);
      box-shadow: none;
    }

    button:disabled { opacity: .6; cursor: wait; }

    .muted { color: var(--muted); }
    .small { font-size: .88rem; }
    .spacer { height: 18px; }

    .pillrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 8px 12px;
      background: #eef4ff;
      color: var(--primary);
      font-weight: 800;
      font-size: .88rem;
      border: 1px solid #d7e5ff;
    }

    .message {
      display: none;
      border-radius: 16px;
      border: 1px solid #c7d7fe;
      background: #eef4ff;
      color: #1e3a8a;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-weight: 650;
    }

    .message.error {
      border-color: #fecaca;
      background: #fef3f2;
      color: #991b1b;
    }

    .config-warning {
      border: 1px dashed #f59e0b;
      background: #fffbeb;
      color: #92400e;
      padding: 16px;
      border-radius: 18px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .month {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    .month-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }

    .days, .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .weekday {
      padding: 8px 4px;
      text-align: center;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 800;
      background: #fbfdff;
    }

    .day {
      min-height: 56px;
      border-top: 1px solid #edf1f6;
      border-right: 1px solid #edf1f6;
      padding: 6px;
      font-size: .78rem;
      position: relative;
      background: white;
    }

    .day:nth-child(7n) { border-right: 0; }
    .day.blank { background: #fbfdff; }
    .day.today { outline: 2px solid #93b4ff; outline-offset: -2px; }
    .day.occupied { background: #eff6ff; }
    .day.occupied.confirmed { background: #ecfdf3; }
    .day.occupied.planned { background: #fffaeb; }

    .day-number { font-weight: 900; }
    .day-booking { margin-top: 4px; font-size: .68rem; line-height: 1.15; color: #334155; word-break: break-word; }

    .booking-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: white;
      display: grid;
      gap: 10px;
    }

    .booking-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .status {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: .76rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.confirmed { color: var(--success); background: #ecfdf3; }
    .status.planned { color: var(--warning); background: #fffaeb; }
    .status.cancelled { color: var(--danger); background: #fef3f2; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      background: #fbfdff;
    }

    code {
      background: #eef2ff;
      color: #312e81;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .hero, .dashboard { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 18px, 1180px); padding-top: 12px; }
      .topbar { align-items: flex-start; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      button { width: 100%; }
      .actions button { width: auto; }
      .padded { padding: 17px; }
      .day { min-height: 50px; padding: 5px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand"><div class="logo">FH</div><span>Familien-Belegungsplan</span></div>
      <div id="userBadge" class="pillrow"></div>
    </div>
    <div id="message" class="message"></div>
    <div id="app"></div>
  </main>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = window.FERIENWOHNUNG_CONFIG?.SUPABASE_URL || "";
    const SUPABASE_ANON_KEY = window.FERIENWOHNUNG_CONFIG?.SUPABASE_ANON_KEY || "";

    const CONFIGURED = SUPABASE_URL.startsWith("https://") && !SUPABASE_URL.includes("HIER_") && !SUPABASE_ANON_KEY.includes("HIER_");
    let sb = null;

    const state = {
      loading: false,
      user: null,
      home: null,
      member: null,
      bookings: []
    };

    const STATUS_LABEL = {
      planned: "Geplant",
      confirmed: "Bestätigt",
      cancelled: "Abgesagt"
    };

    const MONTHS = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
    const WEEKDAYS = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];

    function $(id) { return document.getElementById(id); }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showMessage(text, type = "info") {
      const box = $("message");
      box.textContent = text;
      box.className = type === "error" ? "message error" : "message";
      box.style.display = "block";
      window.setTimeout(() => { box.style.display = "none"; }, 7000);
    }

    function setLoading(value) {
      state.loading = value;
      document.querySelectorAll("button").forEach(btn => btn.disabled = value);
    }

    function parseDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    function toIsoDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function todayIso() {
      return toIsoDate(new Date());
    }

    function formatDate(iso) {
      const [y, m, d] = iso.split("-");
      return `${d}.${m}.${y}`;
    }

    function nights(startIso, endIso) {
      const ms = parseDate(endIso) - parseDate(startIso);
      return Math.max(0, Math.round(ms / 86400000));
    }

    function normalizeHomeRelation(value) {
      if (Array.isArray(value)) return value[0] ?? null;
      return value ?? null;
    }

    function bookingLabel(booking) {
      return booking.title || booking.profiles?.display_name || booking.profiles?.email || "Belegung";
    }

    async function init() {
      renderShellOnly();
      if (!CONFIGURED) {
        renderConfigMissing();
        return;
      }

      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      sb.auth.onAuthStateChange(async () => { await refresh(); });
      await refresh();
    }

    async function refresh() {
      try {
        setLoading(true);

        // Beim ersten Öffnen der App gibt es noch keine Auth-Session.
        // Das ist kein Fehler, sondern bedeutet nur: Login-Formular anzeigen.
        const { data: { session }, error } = await sb.auth.getSession();
        if (error) throw error;
        const user = session?.user || null;

        state.user = user;
        state.home = null;
        state.member = null;
        state.bookings = [];

        if (user) {
          await loadHomeAndBookings();
        }
        render();
      } catch (error) {
        const msg = String(error.message || "");
        if (!msg.toLowerCase().includes("auth session missing")) {
          showMessage(error.message || "Es ist ein Fehler aufgetreten.", "error");
        }
        render();
      } finally {
        setLoading(false);
      }
    }

    async function loadHomeAndBookings() {
      const { data, error } = await sb
        .from("home_members")
        .select("role, home_id, homes(id, name, invite_code, owner_user_id)")
        .order("created_at", { ascending: true })
        .limit(1);

      if (error) throw error;
      if (!data || data.length === 0) return;

      state.member = data[0];
      state.home = normalizeHomeRelation(data[0].homes);
      if (state.home) await loadBookings();
    }

    async function loadBookings() {
      const { data, error } = await sb
        .from("bookings")
        .select("id, home_id, user_id, title, start_date, end_date, status, notes, created_at, profiles(display_name, email)")
        .eq("home_id", state.home.id)
        .order("start_date", { ascending: true });

      if (error) throw error;
      state.bookings = data || [];
    }

    function renderShellOnly() {
      $("userBadge").innerHTML = "";
    }

    function renderConfigMissing() {
      $("app").innerHTML = `
        <section class="hero">
          <div class="card padded">
            <h1>Die WebApp ist erstellt.</h1>
            <p class="lead">Es fehlen nur noch die zwei öffentlichen Supabase-Werte in dieser Datei: Project URL und anon/public key.</p>
            <div class="spacer"></div>
            <div class="config-warning">
              <strong>Konfiguration fehlt:</strong><br>
              Öffne <code>config.js</code> und ersetze dort diese beiden Werte:<br><br>
              <code>SUPABASE_URL</code><br>
              <code>SUPABASE_ANON_KEY</code>
            </div>
          </div>
          <div class="card padded stack">
            <h2>Danach ist sie cloudfähig</h2>
            <p>Die Datei kann als statische Website veröffentlicht werden, zum Beispiel über GitHub Pages, Netlify oder Vercel. Die Daten, Registrierung und Anmeldung laufen über Supabase.</p>
          </div>
        </section>`;
    }

    function render() {
      renderUserBadge();
      if (!state.user) return renderAuth();
      if (!state.home) return renderSetup();
      return renderDashboard();
    }

    function renderUserBadge() {
      if (!state.user) {
        $("userBadge").innerHTML = "";
        return;
      }
      $("userBadge").innerHTML = `
        <span class="pill">${escapeHtml(state.user.email)}</span>
        <button class="ghost" onclick="logout()">Abmelden</button>
      `;
    }

    function renderAuth() {
      $("app").innerHTML = `
        <section class="hero">
          <div class="card padded">
            <div class="pillrow"><span class="pill">Cloud-WebApp</span><span class="pill">Familienintern</span><span class="pill">Mit Login</span></div>
            <div class="spacer"></div>
            <h1>Belegungsplan für eure Ferienwohnung.</h1>
            <p class="lead">Registrieren, anmelden, Familienwohnung anlegen oder per Einladungscode beitreten und Belegungen mit Anreise, Abreise, Status und Notizen verwalten.</p>
          </div>
          <div class="card padded stack">
            <h2>Anmelden</h2>
            <form class="stack" onsubmit="login(event)">
              <label>E-Mail
                <input name="email" type="email" autocomplete="email" required placeholder="name@beispiel.de">
              </label>
              <label>Passwort
                <input name="password" type="password" autocomplete="current-password" required minlength="6" placeholder="Mindestens 6 Zeichen">
              </label>
              <button type="submit">Anmelden</button>
            </form>
            <div class="spacer"></div>
            <h3>Noch kein Konto?</h3>
            <form class="stack" onsubmit="signup(event)">
              <label>E-Mail
                <input name="email" type="email" autocomplete="email" required placeholder="name@beispiel.de">
              </label>
              <label>Passwort
                <input name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="Mindestens 6 Zeichen">
              </label>
              <button class="secondary" type="submit">Registrieren</button>
            </form>
            <p class="small">Je nach Supabase-Einstellung erhältst du nach der Registrierung eine Bestätigungs-Mail.</p>
          </div>
        </section>`;
    }

    function renderSetup() {
      $("app").innerHTML = `
        <section class="hero">
          <div class="card padded stack">
            <h1>Familienwohnung einrichten.</h1>
            <p class="lead">Lege die Ferienwohnung einmalig an. Danach bekommen Familienmitglieder einen Einladungscode und können beitreten.</p>
            <form class="stack" onsubmit="createHome(event)">
              <label>Dein Name
                <input name="displayName" required placeholder="z. B. Leon">
              </label>
              <label>Name der Ferienwohnung
                <input name="homeName" required placeholder="z. B. Ferienwohnung Gardasee">
              </label>
              <button type="submit">Ferienwohnung anlegen</button>
            </form>
          </div>
          <div class="card padded stack">
            <h2>Oder beitreten</h2>
            <p>Nutze den Einladungscode, den dir ein Familienmitglied aus der App schickt.</p>
            <form class="stack" onsubmit="joinHome(event)">
              <label>Dein Name
                <input name="displayName" required placeholder="z. B. Maria">
              </label>
              <label>Einladungscode
                <input name="inviteCode" required placeholder="z. B. A1B2C3D4E5" style="text-transform: uppercase;">
              </label>
              <button class="secondary" type="submit">Beitreten</button>
            </form>
          </div>
        </section>`;
    }

    function renderDashboard() {
      const upcoming = state.bookings
        .filter(b => b.status !== "cancelled")
        .filter(b => b.end_date >= todayIso()).length;

      $("app").innerHTML = `
        <section class="dashboard">
          <aside class="stack">
            <div class="card padded stack">
              <div>
                <h2>${escapeHtml(state.home.name)}</h2>
                <p>Einladungscode: <code>${escapeHtml(state.home.invite_code)}</code></p>
              </div>
              <div class="grid-2">
                <div class="pill">${upcoming} aktive Belegung${upcoming === 1 ? "" : "en"}</div>
                <div class="pill">Rolle: ${escapeHtml(state.member.role)}</div>
              </div>
              <button class="ghost" onclick="refresh()">Aktualisieren</button>
            </div>
            <div class="card padded stack">
              <h2>Neue Belegung</h2>
              <p class="small">Abreisedatum ist der freie Tag. Beispiel: 01.08. bis 08.08. bedeutet 7 Nächte.</p>
              <form class="stack" onsubmit="createBooking(event)">
                <label>Name / Anlass
                  <input name="title" required value="${escapeHtml(state.user.email.split("@")[0])}">
                </label>
                <div class="grid-2">
                  <label>Anreise
                    <input name="startDate" type="date" required min="${todayIso()}">
                  </label>
                  <label>Abreise
                    <input name="endDate" type="date" required min="${todayIso()}">
                  </label>
                </div>
                <label>Status
                  <select name="status">
                    <option value="planned">Geplant</option>
                    <option value="confirmed">Bestätigt</option>
                  </select>
                </label>
                <label>Notiz
                  <textarea name="notes" placeholder="z. B. Anreise ab 16 Uhr, Schlüssel bei ..."></textarea>
                </label>
                <button type="submit">Belegung speichern</button>
              </form>
            </div>
          </aside>
          <section class="stack">
            <div class="card padded stack">
              <div class="booking-head">
                <div>
                  <h2>Kalenderübersicht</h2>
                  <p>Nächste vier Monate. Aktive Belegungen werden direkt im Kalender markiert.</p>
                </div>
              </div>
              <div class="calendar-grid">${renderCalendarMonths()}</div>
            </div>
            <div class="card padded stack">
              <h2>Belegungen</h2>
              ${renderBookingList()}
            </div>
          </section>
        </section>`;
    }

    function renderCalendarMonths() {
      const now = new Date();
      const currentMonthStart = new Date(Date.UTC(now.getFullYear(), now.getMonth(), 1));
      return [0, 1, 2, 3].map(offset => {
        const month = new Date(Date.UTC(currentMonthStart.getUTCFullYear(), currentMonthStart.getUTCMonth() + offset, 1));
        return renderMonth(month);
      }).join("");
    }

    function renderMonth(monthDate) {
      const y = monthDate.getUTCFullYear();
      const m = monthDate.getUTCMonth();
      const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
      const firstWeekday = (new Date(Date.UTC(y, m, 1)).getUTCDay() + 6) % 7;
      const blanks = Array.from({ length: firstWeekday }, () => `<div class="day blank"></div>`).join("");
      const today = todayIso();
      let days = "";

      for (let day = 1; day <= daysInMonth; day++) {
        const iso = toIsoDate(new Date(Date.UTC(y, m, day)));
        const booking = activeBookingOn(iso);
        const status = booking?.status || "";
        const classes = ["day", iso === today ? "today" : "", booking ? "occupied" : "", status].filter(Boolean).join(" ");
        days += `
          <div class="${classes}" title="${booking ? escapeHtml(bookingLabel(booking)) : ""}">
            <div class="day-number">${day}</div>
            ${booking ? `<div class="day-booking">${escapeHtml(bookingLabel(booking))}</div>` : ""}
          </div>`;
      }

      return `
        <div class="month">
          <div class="month-title"><span>${MONTHS[m]}</span><span>${y}</span></div>
          <div class="weekdays">${WEEKDAYS.map(d => `<div class="weekday">${d}</div>`).join("")}</div>
          <div class="days">${blanks}${days}</div>
        </div>`;
    }

    function activeBookingOn(dayIso) {
      return state.bookings.find(b =>
        b.status !== "cancelled" &&
        dayIso >= b.start_date &&
        dayIso < b.end_date
      );
    }

    function renderBookingList() {
      if (!state.bookings.length) {
        return `<div class="empty"><h3>Noch keine Belegungen</h3><p>Erstelle links die erste Belegung für eure Ferienwohnung.</p></div>`;
      }

      const sorted = [...state.bookings].sort((a, b) => {
        if (a.status === "cancelled" && b.status !== "cancelled") return 1;
        if (a.status !== "cancelled" && b.status === "cancelled") return -1;
        return a.start_date.localeCompare(b.start_date);
      });

      return `<div class="stack">${sorted.map(b => `
        <article class="booking-card">
          <div class="booking-head">
            <div>
              <h3>${escapeHtml(bookingLabel(b))}</h3>
              <p class="small">${formatDate(b.start_date)} bis ${formatDate(b.end_date)} · ${nights(b.start_date, b.end_date)} Nacht/Nächte</p>
            </div>
            <span class="status ${escapeHtml(b.status)}">${STATUS_LABEL[b.status]}</span>
          </div>
          ${b.notes ? `<p>${escapeHtml(b.notes)}</p>` : ""}
          <div class="actions">
            ${b.status !== "confirmed" ? `<button class="secondary" onclick="setBookingStatus('${b.id}', 'confirmed')">Bestätigen</button>` : ""}
            ${b.status !== "planned" ? `<button class="ghost" onclick="setBookingStatus('${b.id}', 'planned')">Auf geplant setzen</button>` : ""}
            ${b.status !== "cancelled" ? `<button class="danger" onclick="setBookingStatus('${b.id}', 'cancelled')">Stornieren</button>` : ""}
            <button class="ghost" onclick="deleteBooking('${b.id}')">Löschen</button>
          </div>
        </article>`).join("")}</div>`;
    }

    async function signup(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        setLoading(true);
        const email = String(form.get("email")).trim();
        const password = String(form.get("password"));
        const { error } = await sb.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });
        if (error) throw error;
        showMessage("Registrierung angelegt. Falls E-Mail-Bestätigung aktiv ist: Bitte bestätige dein Konto per Mail.");
      } catch (error) {
        showMessage(error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    async function login(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        setLoading(true);
        const email = String(form.get("email")).trim();
        const password = String(form.get("password"));
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        showMessage("Angemeldet.");
        await refresh();
      } catch (error) {
        showMessage(error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    async function logout() {
      await sb.auth.signOut();
      state.user = null;
      state.home = null;
      state.member = null;
      state.bookings = [];
      render();
    }

    async function createHome(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        setLoading(true);
        const { error } = await sb.rpc("create_home", {
          p_home_name: String(form.get("homeName")).trim(),
          p_display_name: String(form.get("displayName")).trim()
        });
        if (error) throw error;
        showMessage("Ferienwohnung angelegt.");
        await refresh();
      } catch (error) {
        showMessage(error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    async function joinHome(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        setLoading(true);
        const { error } = await sb.rpc("join_home_by_code", {
          p_invite_code: String(form.get("inviteCode")).trim(),
          p_display_name: String(form.get("displayName")).trim()
        });
        if (error) throw error;
        showMessage("Du bist der Ferienwohnung beigetreten.");
        await refresh();
      } catch (error) {
        showMessage(error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    async function createBooking(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const startDate = String(form.get("startDate"));
      const endDate = String(form.get("endDate"));

      if (!startDate || !endDate || endDate <= startDate) {
        showMessage("Die Abreise muss nach der Anreise liegen.", "error");
        return;
      }

      try {
        setLoading(true);
        const { error } = await sb.from("bookings").insert({
          home_id: state.home.id,
          user_id: state.user.id,
          title: String(form.get("title")).trim(),
          start_date: startDate,
          end_date: endDate,
          status: String(form.get("status")),
          notes: String(form.get("notes") || "").trim() || null
        });
        if (error) throw error;
        event.currentTarget.reset();
        showMessage("Belegung gespeichert.");
        await refresh();
      } catch (error) {
        const message = String(error.message || "");
        if (message.includes("bookings_no_overlap") || message.includes("conflicting key value")) {
          showMessage("Dieser Zeitraum überschneidet sich mit einer bestehenden aktiven Belegung.", "error");
        } else {
          showMessage(error.message, "error");
        }
      } finally {
        setLoading(false);
      }
    }

    async function setBookingStatus(id, status) {
      try {
        setLoading(true);
        const { error } = await sb.from("bookings").update({ status }).eq("id", id).eq("home_id", state.home.id);
        if (error) throw error;
        showMessage("Status aktualisiert.");
        await refresh();
      } catch (error) {
        const message = String(error.message || "");
        if (message.includes("bookings_no_overlap") || message.includes("conflicting key value")) {
          showMessage("Status kann nicht gesetzt werden, weil der Zeitraum dann mit einer anderen aktiven Belegung kollidiert.", "error");
        } else {
          showMessage(error.message, "error");
        }
      } finally {
        setLoading(false);
      }
    }

    async function deleteBooking(id) {
      if (!confirm("Diese Belegung wirklich löschen?")) return;
      try {
        setLoading(true);
        const { error } = await sb.from("bookings").delete().eq("id", id).eq("home_id", state.home.id);
        if (error) throw error;
        showMessage("Belegung gelöscht.");
        await refresh();
      } catch (error) {
        showMessage(error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    window.signup = signup;
    window.login = login;
    window.logout = logout;
    window.createHome = createHome;
    window.joinHome = joinHome;
    window.createBooking = createBooking;
    window.setBookingStatus = setBookingStatus;
    window.deleteBooking = deleteBooking;
    window.refresh = refresh;

    init();
  </script>
</body>
</html>
